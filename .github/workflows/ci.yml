name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Restore
        run: dotnet restore Danfe.NFe.Core.sln

      - name: Build
        run: dotnet build Danfe.NFe.Core.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Danfe.NFe.Core.sln --configuration Release --no-build --verbosity normal
