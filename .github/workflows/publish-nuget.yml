name: Publish NuGet

# Dispara quando você fizer:
#   git tag v2.0.0 && git push origin v2.0.0
# Ou manualmente pela aba Actions (workflow_dispatch).
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão (ex.: 2.0.1)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necessário para softprops/action-gh-release criar GitHub Release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            # v2.0.0 -> 2.0.0
            VERSION="${GITHUB_REF_NAME#v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Restore
        run: dotnet restore Danfe.NFe.Core/Danfe.NFe.Core.csproj

      - name: Build
        run: |
          dotnet build Danfe.NFe.Core/Danfe.NFe.Core.csproj \
            --configuration Release \
            --no-restore \
            /p:Version=${{ steps.version.outputs.version }} \
            /p:AssemblyVersion=${{ steps.version.outputs.version }}.0 \
            /p:FileVersion=${{ steps.version.outputs.version }}.0

      - name: Pack
        run: |
          dotnet pack Danfe.NFe.Core/Danfe.NFe.Core.csproj \
            --configuration Release \
            --no-build \
            --output ./artifacts \
            /p:Version=${{ steps.version.outputs.version }}

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.version }}
          path: ./artifacts/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
